<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajax Fetch Profil</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      #hasil-profil {
        margin-top: 15px;
        padding: 10px;
        border: 1px solid #ddd;
        display: none; 
        background-color: #f9f9f9;
      }
      button {
        padding: 10px 20px;
        cursor: pointer;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <h2>Data Profil Pengguna</h2>

    <button id="btn-tampilkan">Tampilkan Profil</button>

    <div id="hasil-profil"></div>

    <script>
      document
        .getElementById("btn-tampilkan")
        .addEventListener("click", function () {
          fetch("data.php")
            .then((response) => {
              if (!response.ok) {
                throw new Error("Gagal mengambil data dari server");
              }
              return response.json();
            })
            .then((data) => {
              const wadah = document.getElementById("hasil-profil");
              wadah.innerHTML = "";

              data.forEach((item, index) => {
                const isiBaris = `<p>${index + 1}. Nama: <strong>${item.nama}</strong> | 
                                  Pekerjaan: <strong>${item.pekerjaan}</strong> | 
                                  Lokasi: <strong>${item.lokasi}</strong></p>`;

                wadah.innerHTML += isiBaris;
              });

              wadah.style.display = "block";
            })
            .catch((error) => {
              console.error("Terjadi kesalahan:", error);
              alert("Gagal memuat data.");
            });
        });
    </script>
  </body>
</html>
