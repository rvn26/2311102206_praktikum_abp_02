<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lapor Pak | Edit Laporan</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-blue: #0d6efd;
        --bg-light: #f4f7fe;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-light);
        color: #1e293b;
      }

      .navbar {
        background: linear-gradient(
          135deg,
          #0d6efd 0%,
          #0a58ca 100%
        ) !important;
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.15);
        padding: 0.8rem 0;
      }

      .content-card {
        background: #fff;
        border-radius: 20px;
        border: none;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        padding: 2.5rem;
      }

      .form-label {
        font-weight: 600;
        font-size: 0.85rem;
        color: #64748b;
        margin-bottom: 0.5rem;
      }

      .form-control,
      .form-select {
        border-radius: 12px;
        padding: 0.75rem 1rem;
        border: 1.5px solid #f1f5f9;
        background-color: #f8fafc;
        transition: all 0.2s ease;
      }

      .form-control:focus,
      .form-select:focus {
        background-color: #fff;
        border-color: var(--primary-blue);
        box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
      }

      .btn-primary {
        background: var(--primary-blue);
        border: none;
        border-radius: 12px;
        font-weight: 600;
        padding: 0.8rem 2rem;
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(13, 110, 253, 0.3);
      }

      .invalid-feedback {
        font-size: 0.75rem;
        font-weight: 500;
        margin-top: 0.4rem;
      }
      .is-invalid {
        border-color: #ef4444 !important;
      }

      /* Loading Overlay */
      #loadingOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.8);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="loadingOverlay">
      <div class="text-center">
        <div class="spinner-border text-primary mb-2" role="status"></div>
        <p class="text-muted small fw-bold">Memuat Data...</p>
      </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
          <i class="fas fa-shield-halved me-2"></i>LAPOR<span class="opacity-75"
            >PAK</span
          >
        </a>
        <div class="ms-auto">
          <a
            href="index.html"
            class="btn btn-light btn-sm text-primary px-4 fw-bold shadow-sm"
          >
            <i class="fas fa-arrow-left me-2"></i>Kembali
          </a>
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="row justify-content-center mb-5">
        <div class="col-lg-7">
          <div class="content-card" id="mainContent" style="display: none">
            <div class="text-center mb-5">
              <h3 class="fw-bold mb-2">Perbarui Laporan</h3>
              <p class="text-muted small">
                Edit informasi laporan yang telah tersimpan di sistem.
              </p>
            </div>

            <div id="alertContainer"></div>

            <form id="laporanForm">
              <input type="hidden" id="laporanId" name="id" />

              <div class="row">
                <div class="col-md-6 mb-4">
                  <label for="nama" class="form-label">Nama Lengkap</label>
                  <input
                    type="text"
                    class="form-control"
                    id="nama"
                    name="nama"
                    placeholder="Contoh: John Doe"
                  />
                </div>
                <div class="col-md-6 mb-4">
                  <label for="email" class="form-label">Email Aktif</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    placeholder="nama@email.com"
                  />
                </div>
              </div>

              <div class="mb-4">
                <label for="pekerjaan" class="form-label"
                  >Bidang Pekerjaan</label
                >
                <select class="form-select" id="pekerjaan" name="pekerjaan">
                  <option value="">Pilih pekerjaan...</option>
                  <option value="Programmer">Programmer</option>
                  <option value="Designer">Designer</option>
                  <option value="Manager">Manager</option>
                  <option value="Analyst">Analyst</option>
                  <option value="DevOps">DevOps Engineer</option>
                </select>
              </div>

              <div class="mb-4">
                <label for="isi_laporan" class="form-label"
                  >Detail Laporan</label
                >
                <textarea
                  class="form-control"
                  id="isi_laporan"
                  name="isi_laporan"
                  rows="5"
                  placeholder="Tuliskan laporan Anda di sini..."
                ></textarea>
                <div class="form-text small mt-2" id="charCounter">
                  0/1000 karakter
                </div>
              </div>

              <div class="d-grid mt-5">
                <button type="submit" class="btn btn-primary" id="submitBtn">
                  <i class="fas fa-save me-2"></i>Simpan Perubahan
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      $(document).ready(function () {
        const urlParams = new URLSearchParams(window.location.search);
        const laporanId = urlParams.get("id");

        if (!laporanId) {
          window.location.href = "index.html";
          return;
        }


        $.ajax({
          url: `/api/laporan/${laporanId}`,
          method: "GET",
          success: function (res) {
            if (res.success) {
              $("#laporanId").val(res.data.id);
              $("#nama").val(res.data.nama);
              $("#email").val(res.data.email);
              $("#pekerjaan").val(res.data.pekerjaan);
              $("#isi_laporan").val(res.data.isi_laporan);

              $("#loadingOverlay").fadeOut();
              $("#mainContent").fadeIn();
              updateCounter();
            }
          },
          error: function () {
            alert("Gagal memuat data!");
            window.location.href = "index.html";
          },
        });

        $("#laporanForm").validate({
          rules: {
            nama: { required: true, minlength: 3 },
            email: { required: true, email: true },
            pekerjaan: { required: true },
            isi_laporan: { required: true, minlength: 10 },
          },
          messages: {
            nama: "Mohon masukkan nama lengkap",
            email: "Masukkan email yang valid",
            pekerjaan: "Pilih pekerjaan",
            isi_laporan: "Laporan minimal 10 karakter",
          },
          errorClass: "invalid-feedback",
          highlight: function (e) {
            $(e).addClass("is-invalid");
          },
          unhighlight: function (e) {
            $(e).removeClass("is-invalid");
          },
          errorPlacement: function (error, element) {
            error.insertAfter(element);
          },
        });

        function updateCounter() {
          let len = $("#isi_laporan").val().length;
          $("#charCounter").text(`${len}/1000 karakter`);
        }

        $("#isi_laporan").on("input", updateCounter);

        $("#laporanForm").on("submit", function (e) {
          e.preventDefault();
          if (!$(this).valid()) return;

          const btn = $("#submitBtn");
          btn
            .prop("disabled", true)
            .html(
              '<i class="fas fa-circle-notch fa-spin me-2"></i>Mengupdate...',
            );

          const formData = {
            nama: $("#nama").val(),
            email: $("#email").val(),
            pekerjaan: $("#pekerjaan").val(),
            isi_laporan: $("#isi_laporan").val(),
          };

          $.ajax({
            url: `/api/laporan/${laporanId}`,
            method: "PUT",
            contentType: "application/json",
            data: JSON.stringify(formData),
            success: function (res) {
              if (res.success) {
                $("#alertContainer").html(
                  '<div class="alert alert-success border-0 shadow-sm"><i class="fas fa-check-circle me-2"></i>Berhasil diperbarui! Mengalihkan...</div>',
                );
                setTimeout(() => (window.location.href = "index.html"), 1500);
              }
            },
            error: function () {
              btn
                .prop("disabled", false)
                .html('<i class="fas fa-save me-2"></i>Simpan Perubahan');
              $("#alertContainer").html(
                '<div class="alert alert-danger border-0 shadow-sm"><i class="fas fa-times-circle me-2"></i>Gagal memperbarui data.</div>',
              );
            },
          });
        });
      });
    </script>
  </body>
</html>
