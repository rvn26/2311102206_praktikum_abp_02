<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lapor Pak | Professional Dashboard</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css"
    />

    <style>
      :root {
        --primary-blue: #0d6efd;
        --bg-light: #f4f7fe;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-light);
        color: #1e293b;
      }

      .navbar {
        background: linear-gradient(
          135deg,
          #0d6efd 0%,
          #0a58ca 100%
        ) !important;
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.15);
        padding: 0.8rem 0;
      }

      .stat-box {
        background: #fff;
        border-radius: 16px;
        padding: 1.5rem;
        border: none;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        transition: transform 0.3s ease;
      }
      .stat-number {
        font-size: 2.2rem;
        font-weight: 700;
        color: var(--primary-blue);
      }

      .content-card {
        background: #fff;
        border-radius: 20px;
        border: none;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        padding: 2rem;
      }

      .dataTables_length select {
        border-radius: 8px;
        padding: 5px 10px;
        border: 1px solid #dee2e6;
        margin: 0 5px;
      }
      .dataTables_filter input {
        border-radius: 8px;
        padding: 6px 12px;
        border: 1px solid #dee2e6;
        margin-left: 10px;
      }

      table.dataTable thead th {
        background-color: #f8fafc;
        color: #64748b;
        text-transform: uppercase;
        font-size: 0.7rem;
        letter-spacing: 1px;
        border: none;
        padding: 15px !important;
      }
      table.dataTable tbody td {
        padding: 1.2rem 15px !important;
        border-bottom: 1px solid #f1f5f9 !important;
      }

      .badge-soft {
        padding: 0.5em 0.8em;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.75rem;
      }
      .bg-soft-blue {
        background: rgba(13, 110, 253, 0.1);
        color: var(--primary-blue);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
          LAPOR<span class="opacity-75">PAK</span>
        </a>
        <div class="ms-auto">
          <a
            href="tambah.html"
            class="btn btn-light btn-sm text-primary px-4 fw-bold shadow-sm"
            >+ Buat Laporan</a
          >
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="row mb-4 align-items-center">
        <div class="col-md-8">
          <h4 class="fw-bold mb-1">Ringkasan Sistem</h4>
          <p class="text-muted small">
            Data laporan masuk yang terenkripsi secara aman.
          </p>
        </div>
        <div class="col-md-4">
          <div
            class="stat-box d-flex justify-content-between align-items-center"
          >
            <div>
              <p class="text-muted small mb-0 fw-medium">Total Pelapor</p>
              <div class="stat-number" id="totalPelapor">0</div>
            </div>
            <div class="bg-soft-blue p-3 rounded-circle">
              <i class="fas fa-users fa-lg"></i>
            </div>
          </div>
        </div>
      </div>

      <div class="row mb-5">
        <div class="col-12">
          <div class="content-card">
            <h5 class="fw-bold mb-4">Daftar Laporan Terkini</h5>
            <table
              id="laporanTable"
              class="table align-middle"
              style="width: 100%"
            >
              <thead>
                <tr>
                  <th>Pelapor</th>
                  <th>Pekerjaan</th>
                  <th>Status/Laporan</th>
                  <th class="text-end">Aksi</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      $(document).ready(function () {
        const table = $("#laporanTable").DataTable({
          ajax: {
            url: "/api/laporan",
            dataSrc: function (json) {
              $("#totalPelapor").text(json.data.length);
              return json.data;
            },
          },
          pageLength: 10,
          lengthMenu: [
            [5, 10, 25, 50, -1],
            [5, 10, 25, 50, "Semua"],
          ],
          dom: '<"d-flex justify-content-between mr-4 align-items-center mb-4"lf>rt<"d-flex justify-content-between mt-4"ip>',
          columns: [
            {
              data: null,
              render: (data) => `
                <div class="fw-bold text-dark">${data.nama}</div>
                <div class="text-muted small">${data.email}</div>`,
            },
            {
              data: "pekerjaan",
              render: (data) =>
                `<span class="badge-soft bg-soft-blue">${data}</span>`,
            },
            {
              data: "isi_laporan",
              render: (data) =>
                `<div class="text-muted small text-truncate" style="max-width:280px" title="${data}">${data}</div>`,
            },
            {
              data: "id",
              className: "text-end",
              render: (id) => `
                <div class="dropdown">
                  <button class="btn btn-light btn-sm shadow-sm" data-bs-toggle="dropdown"><i class="fas fa-ellipsis-v"></i>
                </button>
                  <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg p-2">
                    <li><a class="dropdown-item small py-2 rounded" href="edit.html?id=${id}"><i class="fas fa-edit me-2 text-warning"></i>Edit</a></li>
                    <li><button class="dropdown-item small py-2 rounded text-danger btn-delete" data-id="${id}"><i class="fas fa-trash me-2"></i>Hapus</button></li>
                  </ul>
                </div>`,
            },
          ],
          language: {
            lengthMenu: "Tampilkan _MENU_ data",
            search: "Cari nama pelapor:",
            info: "Menampilkan _START_ sampai _END_ dari _TOTAL_ laporan",
            paginate: { next: "→", previous: "←" },
          },
        });

        $("#laporanTable tbody").on("click", ".btn-delete", function () {
          const id = $(this).data("id");
          if (confirm("Hapus data secara permanen?")) {
            $.ajax({
              url: "/api/laporan/" + id,
              type: "DELETE",
              success: function (res) {
                if (res.success) table.ajax.reload();
              },
            });
          }
        });
      });
    </script>
  </body>
</html>
